<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Compras</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen encoding-utf8">

    <div class="max-w-4xl mx-auto p-4">
        <header class="bg-blue-600 text-white p-6 rounded-lg shadow-md mb-6">
            <h1 class="text-2xl font-bold text-center">Sistema de Relatório de Compras</h1>
            <p class="text-sm text-center text-blue-100 mt-1">Imagens salvas localmente em Base64 (Sem custo de Storage)</p>
        </header>

        <section class="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Adicionar Novo Item</h2>
            <form id="purchaseForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Nome do Produto/Item:</label>
                    <input type="text" id="itemName" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Valor (R$):</label>
                        <input type="number" step="0.01" id="itemValue" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Miniatura da Imagem (Foto/Recibo):</label>
                        <input type="file" id="itemImage" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                </div>

                <div id="previewContainer" class="hidden">
                    <p class="text-xs text-gray-500 mb-1">Pré-visualização da miniatura:</p>
                    <img id="imagePreview" src="" alt="Preview" class="h-20 w-20 object-cover rounded border shadow-sm">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Salvar no Relatório
                </button>
            </form>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Itens Cadastrados</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Miniatura</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Item</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Valor</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="itemsTableBody" class="bg-white divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Suas credenciais fornecidas
        const firebaseConfig = {
            apiKey: "AIzaSyBCFF-ogO9XJHzrv4Dd__pUr80NtyfVEuY",
            authDomain: "relatorio-de-compras.firebaseapp.com",
            projectId: "relatorio-de-compras",
            storageBucket: "relatorio-de-compras.firebasestorage.app",
            messagingSenderId: "702964343593",
            appId: "1:702964343593:web:4d0ce528c06726f2b04d38"
        };

        // Inicializa o Firebase e o Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const comprasCollection = collection(db, "compras");

        // Variável para armazenar a string Base64 temporária
        let base64ImageString = "";

        // Elementos do DOM
        const purchaseForm = document.getElementById('purchaseForm');
        const itemImageInput = document.getElementById('itemImage');
        const imagePreview = document.getElementById('imagePreview');
        const previewContainer = document.getElementById('previewContainer');
        const itemsTableBody = document.getElementById('itemsTableBody');

        // Escuta o upload do arquivo para converter em Base64
        itemImageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    // Limita o tamanho ou resolução reduzindo a qualidade se necessário. 
                    // Para projetos simples, o FileReader direto atende muito bem.
                    base64ImageString = event.target.result;
                    
                    // Mostra o preview na tela
                    imagePreview.src = base64ImageString;
                    previewContainer.classList.remove('hidden');
                };
                
                reader.readAsDataURL(file);
            }
        });

        // Envia os dados para o Firestore
        purchaseForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('itemName').value;
            const value = parseFloat(document.getElementById('itemValue').value);

            try {
                await addDoc(comprasCollection, {
                    nome: name,
                    valor: value,
                    imagemBase64: base64ImageString || null, // Salva o texto da imagem diretamente aqui
                    criadoEm: new Date()
                });

                // Limpa o formulário após o sucesso
                purchaseForm.reset();
                previewContainer.classList.add('hidden');
                base64ImageString = ""; 
                alert("Item salvo com sucesso!");
            } catch (error) {
                console.error("Erro ao salvar no Firestore: ", error);
                alert("Erro ao salvar os dados. Verifique as regras do seu banco de dados.");
            }
        });

        // Escuta as alterações no Firestore em tempo real para listar na tabela
        onSnapshot(comprasCollection, (snapshot) => {
            itemsTableBody.innerHTML = "";
            
            snapshot.forEach((docSnap) => {
                const item = docSnap.data();
                const id = docSnap.id;

                // Define uma imagem padrão caso não tenha foto salva
                const imgTag = item.imagemBase64 
                    ? `<img src="${item.imagemBase64}" class="h-12 w-12 object-cover rounded shadow-sm border">` 
                    : `<span class="text-gray-400 text-xs">Sem foto</span>`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">${imgTag}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${item.nome}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">R$ ${item.valor.toFixed(2)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="deletarItem('${id}')" class="text-red-600 hover:text-red-900 bg-red-50 hover:bg-red-100 px-3 py-1 rounded transition">Excluir</button>
                    </td>
                `;
                itemsTableBody.appendChild(tr);
            });
        });

        // Função global para deletar o item da lista
        window.deletarItem = async (id) => {
            if(confirm("Tem certeza que deseja remover este item?")) {
                try {
                    await deleteDoc(doc(db, "compras", id));
                } catch (error) {
                    console.error("Erro ao deletar: ", error);
                }
            }
        }
    </script>
</body>
</html>
